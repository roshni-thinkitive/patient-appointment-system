databaseChangeLog:
  - changeSet:
      id: create-allergy-table
      author: roshni
      changes:
        - createTable:
            tableName: allergies
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: UUID
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: substance
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: reaction
                  type: VARCHAR(255)
              - column:
                  name: severity
                  type: VARCHAR(50)
              - column:
                  name: onset_date
                  type: DATE
              - column:
                  name: patient_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: is_deleted
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: allergies
            baseColumnNames: patient_id
            referencedTableName: patients
            referencedColumnNames: id
            constraintName: fk_allergies_patient_id
