databaseChangeLog:
  - changeSet:
      id: create-emergency-contacts-table
      author: roshni
      changes:
        - createTable:
            tableName: emergency_contacts
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: UUID
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: patient_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: contact_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: relationship
                  type: VARCHAR(255)
              - column:
                  name: phone_number
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: alternate_phone
                  type: VARCHAR(255)
              - column:
                  name: email
                  type: VARCHAR(255)
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: emergency_contacts
            baseColumnNames: patient_id
            referencedTableName: patients
            referencedColumnNames: id
            constraintName: fk_emergency_contacts_patient_id
