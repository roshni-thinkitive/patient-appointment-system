databaseChangeLog:
  - changeSet:
      id: create-history-table
      author: roshni
      changes:
        - createTable:
            tableName: histories
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: UUID
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: name
                  type: VARCHAR(255)
              - column:
                  name: date
                  type: DATE
              - column:
                  name: note
                  type: TEXT
              - column:
                  name: recorded_date
                  type: DATE
              - column:
                  name: on_set_age
                  type: INT
              - column:
                  name: history_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: relation
                  type: VARCHAR(50)
              - column:
                  name: condition
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: notes
                  type: TEXT
              - column:
                  name: patient_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: is_deleted
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: histories
            baseColumnNames: patient_id
            referencedTableName: patients
            referencedColumnNames: id
            constraintName: fk_histories_patient_id
