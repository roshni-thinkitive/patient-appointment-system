databaseChangeLog:
  - changeSet:
      id: create-insurances-table
      author: roshni
      changes:
        - createTable:
            tableName: insurances
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: UUID
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: patient_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: insurance_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: payer_id
                  type: VARCHAR(255)
              - column:
                  name: member_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: group_number
                  type: VARCHAR(255)
              - column:
                  name: policy_holder_name
                  type: VARCHAR(255)
              - column:
                  name: relationship
                  type: VARCHAR(255)
              - column:
                  name: start_date
                  type: DATE
              - column:
                  name: end_date
                  type: DATE
              - column:
                  name: is_primary
                  type: BOOLEAN
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: insurances
            baseColumnNames: patient_id
            referencedTableName: patients
            referencedColumnNames: id
            constraintName: fk_insurances_patient_id
